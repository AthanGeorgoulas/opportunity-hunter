name: Daily Opportunity Hunt

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Hunter
        env:
          CI: true
          TELEGRAM_TOKEN: dollar_sign_open secrets.TELEGRAM_TOKEN close
          TELEGRAM_CHAT_ID: dollar_sign_open secrets.TELEGRAM_CHAT_ID close
        run: python opportunity_hunter.py
      - name: Commit dashboard
        run: |
          git config --local user.email action@github.com
          git config --local user.name Opportunity Hunter Bot
          git add dashboard.html data/seen.db || true
          git diff --staged --quiet || git commit -m Daily-update
          git push || true
