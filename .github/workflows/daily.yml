name: Daily Opportunity Hunt

on:
  schedule:
    - cron: 0 7 * * *
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Opportunity Hunter
        env:
          CI: true
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python opportunity_hunter.py

      - name: Commit log and db
        run: |
          git config --local user.email action@github.com
          git config --local user.name Opportunity Hunter Bot
          git add data/log.txt data/seen.db || true
          git diff --staged --quiet || git commit -m Daily-run-$(date +%Y-%m-%d)
          git push || true

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-${{ github.run_id }}
          path: data/log.txt
          retention-days: 30
