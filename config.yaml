# ─── Ρυθμίσεις ειδοποιήσεων ─────────────────────────────────
notifications:
  apple_notes: true             # macOS μόνο
  apple_notes_folder: "Opportunity Hunter"
  mac_notification: true        # macOS μόνο
  html_dashboard: true          # Παράγει dashboard.html
  dashboard_auto_open: true    # Ανοίγει browser αυτόματα
  telegram_enabled: false       # Ενεργοποίησε αν θέλεις Telegram
  telegram_token: ""            # Βάλε το token σου από @BotFather
  telegram_chat_id: ""          # Βάλε το chat_id σου

# ─── Scheduler ───────────────────────────────────────────────
schedule:
  hour: 8
  minute: 30

# ─── Γενικά ─────────────────────────────────────────────────
settings:
  desc_max_length: 220
  max_items_per_category: 12
  max_upcoming_items: 10
  fetch_descriptions: false      # false = πιο γρήγορο αλλά χωρίς περιγραφές
  log_level: "INFO"
